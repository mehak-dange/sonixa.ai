<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonixa AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f2747;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 950px;
      margin: 40px auto;
      background: #132f55;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: white;
    }

    .subtitle {
      text-align: center;
      color: #b8cbe6;
      margin-bottom: 24px;
    }

    .status {
      text-align: center;
      margin-bottom: 20px;
      color: #fde68a;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    button, select {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
    }

    button {
      cursor: pointer;
    }

    .start-btn { background: #22c55e; color: white; }
    .stop-btn { background: #ef4444; color: white; }
    .send-btn { background: #2563eb; color: white; }

    .box {
      background: #0b1f3a;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #93c5fd;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
      font-size: 15px;
      color: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sonixa AI</h1>
    <div class="subtitle">Multilingual Conversational Intelligence Platform</div>

    <div class="status" id="status">Ready</div>

    <div class="controls">
      <select id="modeSelect">
        <option value="mixed">Mixed (Kannada + Hindi + English)</option>
        <option value="hindi">Hindi-English</option>
        <option value="kannada">Kannada-English</option>
        <option value="english">English</option>
      </select>

      <button class="start-btn" id="startBtn">Start Recording</button>
      <button class="stop-btn" id="stopBtn" disabled>Stop Recording</button>
      <button class="send-btn" id="sendBtn" disabled>Process Audio</button>
    </div>

    <div class="box">
      <div class="label">Mode</div>
      <pre id="modeOutput">No output yet.</pre>
    </div>

    <div class="box">
      <div class="label">Detected Language</div>
      <pre id="detectedLanguage">No output yet.</pre>
    </div>

    <div class="box">
      <div class="label">Raw Whisper Text</div>
      <pre id="rawText">No output yet.</pre>
    </div>

    <div class="box">
      <div class="label">Processed Text</div>
      <pre id="processedText">No output yet.</pre>
    </div>

    <div class="box">
      <div class="label">Structured Output</div>
      <pre id="structuredOutput">No output yet.</pre>
    </div>
  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];
    let recordedBlob = null;

    const statusEl = document.getElementById("status");
    const modeOutputEl = document.getElementById("modeOutput");
    const detectedLanguageEl = document.getElementById("detectedLanguage");
    const rawTextEl = document.getElementById("rawText");
    const processedTextEl = document.getElementById("processedText");
    const structuredOutputEl = document.getElementById("structuredOutput");
    const modeSelect = document.getElementById("modeSelect");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const sendBtn = document.getElementById("sendBtn");

    startBtn.addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream, {
          mimeType: "audio/webm"
        });

        mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          recordedBlob = new Blob(audioChunks, { type: "audio/webm" });
          sendBtn.disabled = false;
          statusEl.textContent = "Recording stopped. Ready to process.";
        };

        mediaRecorder.start();
        statusEl.textContent = "Recording...";
        startBtn.disabled = true;
        stopBtn.disabled = false;
        sendBtn.disabled = true;
      } catch (error) {
        statusEl.textContent = "Microphone access denied or unavailable.";
        console.error(error);
      }
    });

    stopBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        stopBtn.disabled = true;
        startBtn.disabled = false;
      }
    });

    sendBtn.addEventListener("click", async () => {
      if (!recordedBlob) {
        statusEl.textContent = "No recording found.";
        return;
      }

      statusEl.textContent = "Processing audio...";
      modeOutputEl.textContent = "Processing...";
      detectedLanguageEl.textContent = "Processing...";
      rawTextEl.textContent = "Processing...";
      processedTextEl.textContent = "Processing...";
      structuredOutputEl.textContent = "Processing...";

      const formData = new FormData();
      formData.append("file", recordedBlob, "recording.webm");
      formData.append("mode", modeSelect.value);

      try {
        const response = await fetch("/process-audio", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.error) {
          statusEl.textContent = "Error while processing.";
          structuredOutputEl.textContent = data.error;
          return;
        }

        statusEl.textContent = "Done";
        modeOutputEl.textContent = data.mode || "unknown";
        detectedLanguageEl.textContent = data.detected_language || "unknown";
        rawTextEl.textContent = data.raw_text || "No text returned";
        processedTextEl.textContent = data.processed_text || "No text returned";
        structuredOutputEl.textContent = JSON.stringify(data.structured_output, null, 2);
      } catch (error) {
        statusEl.textContent = "Request failed.";
        structuredOutputEl.textContent = error.toString();
      }
    });
  </script>
</body>
</html>
