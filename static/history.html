<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonixa AI - History</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f2747;
      color: white;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px;
      background: #132f55;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: #2563eb;
      color: white;
      margin-left: 8px;
    }
    .danger { background: #ef4444; }
    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 18px;
    }
    .card {
      background: #132f55;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .section { margin-top: 10px; }
    .label {
      color: #93c5fd;
      font-weight: bold;
      margin-bottom: 6px;
    }
    pre {
      white-space: pre-wrap;
      margin: 0;
      background: #0b1f3a;
      padding: 12px;
      border-radius: 10px;
      color: #f8fafc;
    }
    .row-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
    input {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      min-width: 260px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h2>Sonixa AI - History</h2>
    <div>
      <input type="text" id="searchInput" placeholder="Search reports..." />
      <button class="btn" onclick="loadHistory()">Search</button>
      <button class="btn" onclick="goDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container" id="historyContainer">
    Loading history...
  </div>

  <script>
    const token = localStorage.getItem("sonixa_token");
    if (!token) {
      window.location.href = "/static/login.html";
    }

    async function loadHistory() {
      const container = document.getElementById("historyContainer");
      const q = document.getElementById("searchInput").value.trim();

      try {
        const url = q ? `/history?q=${encodeURIComponent(q)}` : "/history";
        const res = await fetch(url, {
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (data.error) {
          container.textContent = data.error;
          return;
        }

        const history = data.history || [];

        if (history.length === 0) {
          container.textContent = "No reports saved yet.";
          return;
        }

        container.innerHTML = history.map(item => `
          <div class="card">
            <div><strong>Domain:</strong> ${item.domain || "-"}</div>
            <div><strong>Detected Language:</strong> ${item.detected_language || "-"}</div>
            <div><strong>Created At:</strong> ${item.created_at || "-"}</div>

            <div class="section">
              <div class="label">Raw Text</div>
              <pre>${item.raw_text || ""}</pre>
            </div>

            <div class="section">
              <div class="label">Processed Text</div>
              <pre>${item.processed_text || ""}</pre>
            </div>

            <div class="section">
              <div class="label">AI Draft</div>
              <pre>${JSON.stringify(item.structured_output || {}, null, 2)}</pre>
            </div>

            <div class="section">
              <div class="label">Final Report</div>
              <pre>${JSON.stringify(item.final_report || {}, null, 2)}</pre>
            </div>

            <div class="row-actions">
              <button class="btn danger" onclick="deleteReport('${item.id}')">Delete</button>
            </div>
          </div>
        `).join("");
      } catch (err) {
        container.textContent = "Failed to load history.";
      }
    }

    async function deleteReport(reportId) {
      const confirmDelete = confirm("Are you sure you want to delete this report?");
      if (!confirmDelete) return;

      try {
        const res = await fetch(`/delete-report/${reportId}`, {
          method: "DELETE",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (data.error) {
          alert("Delete failed");
          return;
        }

        alert("Report deleted successfully");
        loadHistory();
      } catch (err) {
        alert("Delete request failed");
      }
    }

    function goDashboard() {
      window.location.href = "/static/dashboard.html";
    }

    loadHistory();
  </script>
</body>
</html>
