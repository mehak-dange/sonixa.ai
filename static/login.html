<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonixa AI - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f2747;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #132f55;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h1 { margin-top: 0; text-align: center; }
    .subtitle { text-align: center; color: #b8cbe6; margin-bottom: 24px; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .link { text-align: center; margin-top: 16px; }
    .link a { color: #93c5fd; text-decoration: none; }
    .msg {
      margin-top: 14px;
      text-align: center;
      color: #fde68a;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sonixa AI</h1>
    <div class="subtitle">Login to continue</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />

    <button id="loginBtn">Login</button>

    <div class="msg" id="msg"></div>

    <div class="link">
      New user? <a href="/static/register.html">Create an account</a>
    </div>
  </div>

  <script>
    const msg = document.getElementById("msg");

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      msg.textContent = "Logging in...";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const rawText = await res.text();
        let data = null;

        try {
          data = JSON.parse(rawText);
        } catch {
          data = { detail: rawText };
        }

        if (!res.ok) {
          msg.textContent = data.detail || data.error || "Login failed";
          return;
        }

        localStorage.setItem("sonixa_token", data.token);
        localStorage.setItem("sonixa_user", JSON.stringify(data.user));

        msg.textContent = "Login successful";
        window.location.href = "/static/domain.html";
      } catch (err) {
        msg.textContent = "Server error";
        console.error(err);
      }
    });
  </script>
</body>
</html>
